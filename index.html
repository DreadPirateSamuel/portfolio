<!DOCTYPE HTML>
<html>
<head>
    <title>Sam's Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Responsive Header */
        #header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            text-align: center;
            width: 100%;
        }

        /* Intro Section */
        #intro {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120vh; /* Increased height to avoid disappearing too quickly */
            text-align: center;
            padding: 40px 20px;
        }

        .intro-content {
            max-width: 90%;
            width: 600px;
        }

        /* Bigger Responsive Image */
        .intro-image img {
            width: 100%;
            max-width: 400px; /* Increased image size */
            height: auto;
            margin-bottom: 1rem;
        }

        /* Responsive Text */
        .intro-text {
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 700px;
        }

        /* Contact Section */
        #contact {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 20px 0;
            background-color: azure;
            text-align: center;
        }

        .icons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            list-style: none;
            padding: 0;
        }

        .icons a {
            font-size: 1.2rem;
            text-decoration: none;
            color: inherit;
        }

        /* Skills, Education, Projects */
        .section-content {
            max-width: 90%;
            margin: 0 auto;
            padding: 50px 20px; /* Increased padding to avoid abrupt transition */
            text-align: center;
        }

        /* Ensure lists are readable */
        .section-content ul {
            list-style-type: none;
            padding: 0;
        }

        .section-content li {
            padding: 10px 0;
        }

        /* Responsive Project Images */
        img {
            max-width: 100%;
            height: auto;
        }

        /* Media Queries for Mobile & Larger Screens */
        @media (max-width: 768px) {
            .intro-content {
                width: 90%;
            }

            .intro-image img {
                max-width: 350px; /* Adjusted for tablets */
            }

            .icons a {
                font-size: 1rem;
            }

            .section-content {
                width: 100%;
                padding: 30px 15px;
            }
        }

        @media (max-width: 480px) {
            .intro-text {
                font-size: 1rem;
            }

            .intro-image img {
                max-width: 300px; /* Adjusted for small screens */
            }

            .icons a {
                font-size: 1rem;
            }
        }
    </style>
</head>
